    const DIGITS_AFTER_PREFIX = 7;

    // DOM elements
    const countrySelect = document.getElementById('countrySelect');
    const operatorSelect = document.getElementById('operatorSelect');
    const operatorStep = document.getElementById('operatorStep');
    const countStep = document.getElementById('countStep');
    const generateBtn = document.getElementById('generateBtn');
    const contactCount = document.getElementById('contactCount');
    const prefixTags = document.getElementById('prefixTags');
    const messageBox = document.getElementById('messageBox');

    // Populate country dropdown
    function populateCountries() {
      countries.forEach((country, index) => {
        const option = document.createElement('option');
        option.value = index;
        option.textContent = `${country.name} (+${country.code})`;
        countrySelect.appendChild(option);
      });
    }

    // Update operator dropdown and prefix preview based on selected country
    function updateOperators() {
      const index = countrySelect.value;
      if (index === '') {
        operatorStep.style.display = 'none';
        countStep.style.display = 'none';
        generateBtn.disabled = true;
        return;
      }

      const country = countries[parseInt(index)];
      operatorStep.style.display = 'block';
      countStep.style.display = 'block';

      // Clear previous operator options except "all"
      operatorSelect.innerHTML = '<option value="all">🌐 جميع المقدمات (عشوائي)</option>';

      // Add each operator
      country.operators.forEach((op, idx) => {
        const opt = document.createElement('option');
        opt.value = idx;
        opt.textContent = op.name;
        operatorSelect.appendChild(opt);
      });

      // Update prefix preview tags
      let allPrefixes = [];
      country.operators.forEach(op => {
        op.prefixes.forEach(p => allPrefixes.push(p));
      });
      prefixTags.innerHTML = allPrefixes.map(p => `<span class="operator-tag">${p}</span>`).join(' ');

      // Enable generate button if count is valid
      validateGenerateButton();
    }

    function validateGenerateButton() {
      const countryChosen = countrySelect.value !== '';
      const count = parseInt(contactCount.value);
      const validCount = !isNaN(count) && count > 0 && count <= 500000000000;
      generateBtn.disabled = !(countryChosen && validCount);
    }

    // Random digit generator
    function randomDigits(length) {
      let result = '';
      for (let i = 0; i < length; i++) {
        result += Math.floor(Math.random() * 10).toString();
      }
      return result;
    }

    // Generate contacts and trigger CSV download
    function generateCSV() {
      const countryIndex = countrySelect.value;
      if (countryIndex === '') return;
      const country = countries[parseInt(countryIndex)];
      const operatorChoice = operatorSelect.value; // "all" or index
      const count = parseInt(contactCount.value);
      if (isNaN(count) || count < 1) return;

      const contacts = [];
      for (let i = 0; i < count; i++) {
        let prefix;
        if (operatorChoice === 'all') {
          // Random operator, then random prefix from that operator
          const randomOp = country.operators[Math.floor(Math.random() * country.operators.length)];
          prefix = randomOp.prefixes[Math.floor(Math.random() * randomOp.prefixes.length)];
        } else {
          const op = country.operators[parseInt(operatorChoice)];
          prefix = op.prefixes[Math.floor(Math.random() * op.prefixes.length)];
        }
        const number = `+${country.code}${prefix}${randomDigits(DIGITS_AFTER_PREFIX)}`;
        const name = `Contact_${String(i+1).padStart(4, '0')}`;
        contacts.push([name, number]);
      }

      // Build CSV content
      let csvContent = "Name,Phone\n";
      contacts.forEach(row => {
        csvContent += `"${row[0]}","${row[1]}"\n`;
      });

      // Download via Blob
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.setAttribute('download', 'contacts.csv');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      // Show success message
      messageBox.style.display = 'flex';
      messageBox.innerHTML = `✅ تم إنشاء ${count} جهة اتصال وحفظ الملف CSV. ارفعه إلى Google Contacts.`;
      setTimeout(() => {
        messageBox.style.display = 'none';
      }, 6000);
    }

    // Event listeners
    countrySelect.addEventListener('change', () => {
      updateOperators();
      validateGenerateButton();
    });

    operatorSelect.addEventListener('change', validateGenerateButton);
    contactCount.addEventListener('input', validateGenerateButton);

    generateBtn.addEventListener('click', generateCSV);

    // Initialize
    populateCountries();
    // Default hide message
    messageBox.style.display = 'none';
    generateBtn.disabled = true;
  })();
