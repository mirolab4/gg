<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستعرض الملفات التلقائي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-editor: #1e1e1e;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Changa', sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* شريط العنوان العلوي التلقائي */
        .top-bar {
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .repo-title { font-weight: 700; color: var(--text-main); font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .status-msg { font-size: 0.9rem; font-weight: bold; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; }

        /* منطقة العمل الرئيسية */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* الجانب الأيمن: مستعرض شجرة الملفات والمجلدات */
        .sidebar {
            width: 320px;
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            padding: 15px;
        }

        .sidebar h3 { font-size: 1rem; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; color: var(--accent-color); display: flex; justify-content: space-between; }

        .file-item {
            padding: 10px 12px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            transition: background 0.2s, transform 0.1s;
        }
        .file-item:hover { background-color: rgba(255,255,255,0.05); transform: translateX(-2px); }
        .file-item.folder { color: #f59e0b; font-weight: 600; background-color: rgba(245, 158, 11, 0.03); }
        .file-item.file { color: #38bdf8; background-color: rgba(56, 189, 248, 0.02); }
        .file-item.active { background-color: var(--accent-color); color: white !important; }

        /* الجانب الأيسر: عرض المحتوى المختار */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
        }

        .editor-header {
            background-color: #111827;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            min-height: 55px;
        }

        .current-path { font-family: 'Fira Code', monospace; font-size: 0.9rem; color: var(--text-muted); }

        .btn-view { 
            background-color: var(--success); 
            color: white; 
            padding: 8px 16px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.9rem;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
            transition: background 0.2s;
        }
        .btn-view:hover { background-color: #059669; }

        /* مساحة العرض لقراءة الأكواد والنصوص */
        textarea {
            flex: 1;
            background-color: var(--bg-editor);
            color: #e2e8f0;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            padding: 20px;
            border: none;
            resize: none;
            outline: none;
            line-height: 1.6;
            direction: ltr;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="repo-title" id="repoTitle">📂 جاري فحص المستودع...</div>
        <div id="status" class="status-msg" style="color: orange;">جاري التحميل الفوري...</div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <h3><span>📂 تصفح المجلدات</span> <span id="itemCount" style="font-size:0.8rem; color:var(--text-muted);"></span></h3>
            <div id="fileTree"></div>
        </div>

        <div class="editor-container">
            <div class="editor-header">
                <div class="current-path" id="currentFilePath">الرجاء اختيار ملف من القائمة الجانبية</div>
                <button class="btn-view" id="viewHtmlBtn" style="display:none;">👁️ معاينة تشغيل الـ HTML</button>
            </div>
            <textarea id="codeEditor" placeholder="// سيتم فك وتشفير وعرض الكود البرمجي هنا فوراً عند الضغط عليه..." readonly></textarea>
        </div>
    </div>

<script>
    let username = "";
    let repository = "";
    let currentPath = "";

    // دالة ذكية لاستخراج اسم المستخدم والمستودع من رابط المتصفح الحالي تلقائياً
    function parseGitHubUrl() {
        const hostname = window.location.hostname;
        const pathname = window.location.pathname;

        // إذا كان الموقع يعمل على GitHub Pages (username.github.io/repo)
        if (hostname.includes('.github.io')) {
            username = hostname.split('.')[0];
            repository = pathname.split('/').filter(Boolean)[0] || "";
        } 
        // إذا كان يعمل محلياً للتجربة أو بطريقة أخرى، يضع قيم افتراضية كمثال تحذيري
        else {
            username = "username";
            repository = "repository";
            document.getElementById('status').textContent = "يرجى رفعه على GitHub Pages ليعمل التتبع التلقائي";
            document.getElementById('status').style.color = "red";
            return false;
        }
        
        document.getElementById('repoTitle').innerHTML = `📂 المستودع الحالي: <span style="color:var(--accent-color);">${repository}</span>`;
        return true;
    }

    // دالة جلب الملفات المباشرة من الـ API العام لـ GitHub
    async function loadRepository(path = '/') {
        const status = document.getElementById('status');
        status.style.color = "orange";
        status.textContent = "جاري تحديث القائمة...";

        let url = `https://api.github.com/repos/${username}/${repository}/contents${path === '/' ? '' : path}`;
        
        try {
            let response = await fetch(url);
            if(!response.ok) throw new Error("فشل في جلب البيانات من GitHub");
            let data = await response.json();

            displayFiles(data, path);
            status.style.color = "var(--success)";
            status.textContent = "مُتصل ومُحدث ✅";
        } catch (err) {
            status.style.color = "red";
            status.textContent = "خطأ في الاتصال تلقائياً";
        }
    }

    // بناء وعرض هيكل شجرة المجلدات والملفات بشكل منسق ونظيف
    function displayFiles(items, currentDirPath) {
        const treeContainer = document.getElementById('fileTree');
        treeContainer.innerHTML = '';

        // زر الرجوع للمجلد السابق (يظهر فقط إذا كنا داخل مجلد فرعي)
        if(currentDirPath !== '/') {
            const backItem = document.createElement('div');
            backItem.className = "file-item folder";
            backItem.innerHTML = "🔙 .. (الرجوع للخلف)";
            backItem.onclick = () => {
                let parts = currentDirPath.split('/').filter(Boolean);
                parts.pop();
                loadRepository('/' + parts.join('/'));
            };
            treeContainer.appendChild(backItem);
        }

        // فرز وترتيب العناصر: المجلدات أولاً ثم الملفات العادية لسهولة الوصول لكثرتها
        items.sort((a, b) => (b.type === 'dir') - (a.type === 'dir'));
        document.getElementById('itemCount').textContent = `(${items.length} عنصر)`;

        items.forEach(item => {
            // تخطي ملف index.html الحالي حتى لا يعرض المستعرض نفسه بالخطأ
            if(item.path === 'index.html' && currentDirPath === '/') return;

            const div = document.createElement('div');
            div.className = `file-item ${item.type}`;
            div.innerHTML = item.type === 'dir' ? `📁 ${item.name}` : `📄 ${item.name}`;
            
            if(item.type === 'dir') {
                div.onclick = () => loadRepository('/' + item.path);
            } else {
                div.onclick = () => {
                    document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    openFile(item);
                };
            }
            treeContainer.appendChild(div);
        });
    }

    // دالة فتح وقراءة الملفات الحية
    async function openFile(fileObject) {
        const status = document.getElementById('status');
        status.style.color = "orange";
        status.textContent = "جاري قراءة المحتوى...";

        try {
            let response = await fetch(fileObject.url);
            let data = await response.json();
            
            // فك التشفير عن النص ودعم الكلمات العربية بأمان
            let decodedContent = decodeURIComponent(escape(atob(data.content)));
            
            document.getElementById('codeEditor').value = decodedContent;
            document.getElementById('currentFilePath').textContent = fileObject.path;
            
            currentPath = fileObject.path;
            
            // تخصيص استعراض ملفات الـ HTML بفتحها كصفحة ويب حقيقية في نافذة جديدة
            const viewBtn = document.getElementById('viewHtmlBtn');
            if(fileObject.name.endsWith('.html')) {
                viewBtn.style.display = "inline-block";
                viewBtn.onclick = () => {
                    window.open(`https://${username}.github.io/${repository}/${fileObject.path}`, '_blank');
                };
            } else {
                viewBtn.style.display = "none";
            }

            status.style.color = "var(--success)";
            status.textContent = "تم عرض الملف.";
        } catch (err) {
            status.style.color = "red";
            status.textContent = "خطأ في عرض الملف";
        }
    }

    // بدء التشغيل التلقائي فور فتح الصفحة
    if (parseGitHubUrl()) {
        loadRepository('/');
    }
</script>
</body>
</html>
