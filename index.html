<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستعرض الملفات - GitHub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ---------- لوحة الإعدادات ---------- */
        #config-panel {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13, 17, 23, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #config-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }
        #config-box h2 {
            margin-bottom: 1.5rem;
            text-align: center;
            color: #58a6ff;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: bold;
            color: #8b949e;
        }
        .form-group input {
            width: 100%;
            padding: 0.6rem;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #c9d1d9;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        #connect-btn {
            width: 100%;
            padding: 0.7rem;
            margin-top: 1rem;
            background: #238636;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
        }
        #connect-btn:hover { background: #2ea043; }
        .note {
            font-size: 0.8rem;
            color: #8b949e;
            margin-top: 1rem;
            text-align: center;
        }

        /* ---------- الواجهة الرئيسية ---------- */
        #app {
            display: flex;
            width: 100%;
            height: 100%;
            visibility: hidden;
        }
        #sidebar {
            width: 320px;
            min-width: 260px;
            background: #161b22;
            border-left: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #breadcrumb {
            padding: 0.8rem;
            background: #0d1117;
            border-bottom: 1px solid #30363d;
            font-size: 0.9rem;
            word-break: break-all;
            direction: ltr;
            text-align: left;
            min-height: 45px;
        }
        #breadcrumb span {
            color: #58a6ff;
            cursor: pointer;
        }
        #breadcrumb span:hover { text-decoration: underline; }
        #file-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .item {
            display: flex;
            align-items: center;
            padding: 0.5rem 0.7rem;
            margin: 0.2rem 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            direction: ltr;
            text-align: left;
        }
        .item:hover { background: #1f2937; }
        .item .icon { margin-right: 0.7rem; font-size: 1.3rem; }
        .item .name { 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .folder { color: #58a6ff; font-weight: bold; }
        .loading-text {
            text-align: center;
            padding: 1rem;
            color: #8b949e;
        }
        .error-text {
            color: #f85149;
            text-align: center;
            padding: 1rem;
        }

        #preview {
            flex: 1;
            background: #0d1117;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #preview-header {
            padding: 0.6rem 1rem;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            direction: ltr;
            text-align: left;
            color: #8b949e;
        }
        #preview-content {
            flex: 1;
            overflow: auto;
            padding: 1rem;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        img {
            max-width: 100%;
            border-radius: 8px;
        }
        pre {
            background: #161b22;
            padding: 1rem;
            border-radius: 8px;
            overflow: auto;
            direction: ltr;
            text-align: left;
            color: #c9d1d9;
        }

        @media (max-width: 700px) {
            #app { flex-direction: column; }
            #sidebar { width: 100%; height: 50%; border-left: none; border-bottom: 1px solid #30363d; }
        }
    </style>
</head>
<body>

<!-- لوحة إعدادات المستودع -->
<div id="config-panel">
    <div id="config-box">
        <h2>⚙️ إعدادات المستودع</h2>
        <div class="form-group">
            <label>👤 مالك المستودع</label>
            <input type="text" id="owner" placeholder="مثال: my-username" value="">
        </div>
        <div class="form-group">
            <label>📦 اسم المستودع</label>
            <input type="text" id="repo" placeholder="مثال: my-repo" value="">
        </div>
        <div class="form-group">
            <label>🌿 الفرع (branch)</label>
            <input type="text" id="branch" placeholder="main" value="main">
        </div>
        <div class="form-group">
            <label>🔑 رمز الوصول (اختياري)</label>
            <input type="password" id="token" placeholder="ghp_...">
        </div>
        <button id="connect-btn">🔍 تصفّح المستودع</button>
        <div class="note">سيتم حفظ الإعدادات في المتصفح</div>
    </div>
</div>

<!-- الواجهة الرئيسية -->
<div id="app">
    <!-- الشريط الجانبي للملفات -->
    <div id="sidebar">
        <div id="breadcrumb"></div>
        <div id="file-list"></div>
    </div>

    <!-- منطقة المعاينة -->
    <div id="preview">
        <div id="preview-header">📄 اختر ملفًا لعرضه</div>
        <div id="preview-content"></div>
    </div>
</div>

<script>
    (function() {
        // العناصر
        const configPanel = document.getElementById('config-panel');
        const ownerInput = document.getElementById('owner');
        const repoInput = document.getElementById('repo');
        const branchInput = document.getElementById('branch');
        const tokenInput = document.getElementById('token');
        const connectBtn = document.getElementById('connect-btn');
        const appDiv = document.getElementById('app');
        const breadcrumbDiv = document.getElementById('breadcrumb');
        const fileListDiv = document.getElementById('file-list');
        const previewHeader = document.getElementById('preview-header');
        const previewContent = document.getElementById('preview-content');

        // الحالة
        let owner = '';
        let repo = '';
        let branch = 'main';
        let token = '';
        let currentPath = '';   // مسار نسبي داخل المستودع

        // تحميل الإعدادات من localStorage
        function loadSettings() {
            const saved = localStorage.getItem('github-browser-settings');
            if (saved) {
                try {
                    const s = JSON.parse(saved);
                    ownerInput.value = s.owner || '';
                    repoInput.value = s.repo || '';
                    branchInput.value = s.branch || 'main';
                    tokenInput.value = s.token || '';
                } catch(e) {}
            }
        }
        loadSettings();

        // حفظ الإعدادات
        function saveSettings() {
            localStorage.setItem('github-browser-settings', JSON.stringify({
                owner: owner,
                repo: repo,
                branch: branch,
                token: token
            }));
        }

        // بناء الرؤوس
        function getHeaders() {
            const headers = { 'Accept': 'application/vnd.github.v3+json' };
            if (token) headers['Authorization'] = `token ${token}`;
            return headers;
        }

        // جلب محتويات مسار (مجلد أو ملف)
        async function fetchContents(path) {
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
            const res = await fetch(url, { headers: getHeaders() });
            if (!res.ok) {
                const msg = res.status === 404 ? 'المسار غير موجود' :
                            res.status === 403 ? 'تجاوزت الحد المسموح من الطلبات (أضف رمز وصول)' :
                            `خطأ ${res.status}`;
                throw new Error(msg);
            }
            return res.json();
        }

        // عرض المجلد الحالي
        async function loadDirectory(path) {
            fileListDiv.innerHTML = '<div class="loading-text">⏳ جاري تحميل الملفات...</div>';
            previewHeader.textContent = '📄 اختر ملفًا لعرضه';
            previewContent.innerHTML = '';
            try {
                const data = await fetchContents(path);
                if (!Array.isArray(data)) {
                    // مسار يمثل ملف وليس مجلد (نادر)
                    throw new Error('المسار ليس مجلداً');
                }
                renderDirectory(data, path);
                currentPath = path;
                updateBreadcrumb(path);
            } catch (err) {
                fileListDiv.innerHTML = `<div class="error-text">❌ ${err.message}</div>`;
            }
        }

        // عرض عناصر المجلد
        function renderDirectory(items, parentPath) {
            if (items.length === 0) {
                fileListDiv.innerHTML = '<div class="loading-text">📭 هذا المجلد فارغ</div>';
                return;
            }

            // ترتيب: المجلدات أولاً ثم الملفات أبجدياً
            const folders = items.filter(i => i.type === 'dir').sort((a,b) => a.name.localeCompare(b.name));
            const files = items.filter(i => i.type === 'file').sort((a,b) => a.name.localeCompare(b.name));
            const sorted = [...folders, ...files];

            let html = '';
            // رابط العودة للمجلد الأعلى
            if (parentPath !== '') {
                const parent = parentPath.substring(0, parentPath.lastIndexOf('/')) || '';
                html += `<div class="item folder" data-path="${parent}" data-type="dir">
                    <span class="icon">📁</span><span class="name">.. (المجلد الأعلى)</span>
                </div>`;
            }

            sorted.forEach(item => {
                const icon = item.type === 'dir' ? '📁' : getFileIcon(item.name);
                html += `<div class="item ${item.type === 'dir' ? 'folder' : ''}" 
                              data-path="${item.path}" data-type="${item.type}">
                    <span class="icon">${icon}</span>
                    <span class="name" title="${item.name}">${item.name}</span>
                </div>`;
            });

            fileListDiv.innerHTML = html;

            // إضافة الأحداث
            fileListDiv.querySelectorAll('.item').forEach(el => {
                el.addEventListener('click', async () => {
                    const itemPath = el.dataset.path;
                    const itemType = el.dataset.type;
                    if (itemType === 'dir') {
                        await loadDirectory(itemPath);
                    } else {
                        await previewFile(itemPath);
                    }
                });
            });

            // تحذير إذا كانت القائمة مقطوعة (أكثر من 1000 عنصر)
            if (items.length === 1000) {
                fileListDiv.innerHTML += '<div class="loading-text">⚠️ قد يوجد المزيد من العناصر (الحد الأقصى 1000).</div>';
            }
        }

        // أيقونة حسب الامتداد
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                html: '🌐', htm: '🌐',
                css: '🎨', js: '📜', ts: '📘', json: '📋',
                md: '📝', txt: '📄', pdf: '📕',
                png: '🖼️', jpg: '🖼️', jpeg: '🖼️', gif: '🖼️', svg: '🖼️', webp: '🖼️',
                mp4: '🎬', mp3: '🎵', wav: '🎵', zip: '📦', rar: '📦',
            };
            return icons[ext] || '📄';
        }

        // معاينة ملف
        async function previewFile(filePath) {
            previewHeader.textContent = `📄 ${filePath}`;
            previewContent.innerHTML = '<div class="loading-text">⏳ جاري تحميل المحتوى...</div>';
            try {
                const fileData = await fetchContents(filePath); // تُرجع كائن ملف مع content
                const ext = filePath.split('.').pop().toLowerCase();
                const isHtml = ext === 'html' || ext === 'htm';
                const isImage = ['png','jpg','jpeg','gif','svg','webp','ico'].includes(ext);
                const isText = ['txt','md','csv','json','xml','css','js','ts','py','java','c','cpp','rb','go','rs','sh','yml','yaml','toml','ini'].includes(ext);

                if (isHtml) {
                    // فك تشفير base64 وعرض في iframe
                    const htmlContent = decodeBase64(fileData.content);
                    const blob = new Blob([htmlContent], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    previewContent.innerHTML = `<iframe sandbox="allow-scripts allow-same-origin" src="${url}"></iframe>`;
                } else if (isImage) {
                    // استخدام رابط raw لعرض الصورة
                    const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${filePath}`;
                    previewContent.innerHTML = `<img src="${rawUrl}" alt="${filePath}">`;
                } else if (isText || fileData.size < 100000) { 
                    // عرض النص
                    const text = decodeBase64(fileData.content);
                    previewContent.innerHTML = `<pre>${escapeHtml(text)}</pre>`;
                } else {
                    previewContent.innerHTML = `<div class="loading-text">⚠️ لا يمكن معاينة هذا النوع من الملفات مباشرة. <br>
                    <a href="https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${filePath}" target="_blank">فتح في تبويب جديد</a></div>`;
                }
            } catch (err) {
                previewContent.innerHTML = `<div class="error-text">❌ ${err.message}</div>`;
            }
        }

        // فك base64 (يدعم Unicode)
        function decodeBase64(str) {
            const binary = atob(str.replace(/\s/g, ''));
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // تحديث شريط التنقل
        function updateBreadcrumb(path) {
            if (!path) {
                breadcrumbDiv.innerHTML = '<span data-path="">🏠 الجذر</span>';
            } else {
                const parts = path.split('/');
                let cumulative = '';
                let html = '<span data-path="">🏠 الجذر</span> / ';
                parts.forEach((part, i) => {
                    cumulative += (i === 0 ? '' : '/') + part;
                    html += `<span data-path="${cumulative}">${part}</span> / `;
                });
                breadcrumbDiv.innerHTML = html;
            }
            // أحداث الضغط على شريط التنقل
            breadcrumbDiv.querySelectorAll('span').forEach(span => {
                span.addEventListener('click', (e) => {
                    const p = e.target.dataset.path;
                    loadDirectory(p);
                });
            });
        }

        // بدء التصفح
        async function startBrowsing() {
            owner = ownerInput.value.trim();
            repo = repoInput.value.trim();
            branch = branchInput.value.trim() || 'main';
            token = tokenInput.value.trim();

            if (!owner || !repo) {
                alert('يرجى إدخال اسم المالك واسم المستودع');
                return;
            }

            saveSettings();
            configPanel.style.display = 'none';
            appDiv.style.visibility = 'visible';
            await loadDirectory('');
        }

        // زر الاتصال
        connectBtn.addEventListener('click', startBrowsing);

        // السماح بالضغط على Enter
        [ownerInput, repoInput, branchInput, tokenInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') startBrowsing();
            });
        });

        // في حال تم إعداد مسبق (يمكن إخفاء اللوحة آلياً لو البيانات موجودة)
        // لكن الأفضل إظهارها دوماً للتأكيد
    })();
</script>
</body>
</html>
