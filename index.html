<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستعرض الملفات التلقائي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #error-page {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 2rem;
            text-align: center;
            color: #f85149;
            font-size: 1.2rem;
            flex-direction: column;
        }
        #app {
            display: flex;
            width: 100%;
            height: 100%;
        }
        #sidebar {
            width: 320px;
            min-width: 260px;
            background: #161b22;
            border-left: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }
        #breadcrumb {
            padding: 0.8rem;
            background: #0d1117;
            border-bottom: 1px solid #30363d;
            direction: ltr;
            text-align: left;
            word-break: break-all;
            font-size: 0.9rem;
            min-height: 45px;
        }
        #breadcrumb span { color: #58a6ff; cursor: pointer; }
        #breadcrumb span:hover { text-decoration: underline; }
        #file-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .item {
            display: flex;
            align-items: center;
            padding: 0.5rem 0.7rem;
            margin: 0.2rem 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            direction: ltr;
            text-align: left;
        }
        .item:hover { background: #1f2937; }
        .item .icon { margin-right: 0.7rem; font-size: 1.3rem; }
        .item .name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .folder { color: #58a6ff; font-weight: bold; }
        .loading-text, .error-text {
            text-align: center;
            padding: 1rem;
        }
        .error-text { color: #f85149; }

        #preview {
            flex: 1;
            background: #0d1117;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #preview-header {
            padding: 0.6rem 1rem;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            direction: ltr;
            text-align: left;
            color: #8b949e;
        }
        #preview-content {
            flex: 1;
            overflow: auto;
            padding: 1rem;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        img {
            max-width: 100%;
            border-radius: 8px;
        }
        pre {
            background: #161b22;
            padding: 1rem;
            border-radius: 8px;
            overflow: auto;
            direction: ltr;
            text-align: left;
            color: #c9d1d9;
        }

        @media (max-width: 700px) {
            #app { flex-direction: column; }
            #sidebar { width: 100%; height: 50%; border-left: none; border-bottom: 1px solid #30363d; }
        }
    </style>
</head>
<body>
    <div id="app" style="display: none;">
        <div id="sidebar">
            <div id="breadcrumb"></div>
            <div id="file-list"></div>
        </div>
        <div id="preview">
            <div id="preview-header">📄 اختر ملفًا لعرضه</div>
            <div id="preview-content"></div>
        </div>
    </div>
    <div id="error-page" style="display: none;">
        <div>❌ تعذّر تحميل المستودع</div>
        <div style="font-size: 0.9rem; margin-top: 1rem; color: #8b949e;" id="error-message"></div>
    </div>

<script>
    (function() {
        const appDiv = document.getElementById('app');
        const errorDiv = document.getElementById('error-page');
        const errorMsg = document.getElementById('error-message');
        const breadcrumbDiv = document.getElementById('breadcrumb');
        const fileListDiv = document.getElementById('file-list');
        const previewHeader = document.getElementById('preview-header');
        const previewContent = document.getElementById('preview-content');

        // استخراج owner و repo من رابط الصفحة (GitHub Pages)
        function detectRepo() {
            const host = window.location.hostname;
            const path = window.location.pathname;

            // نمط: username.github.io/repo أو username.github.io/repo/...
            const match = host.match(/^([^.]+)\.github\.io$/);
            if (match) {
                const owner = match[1];
                const parts = path.split('/').filter(p => p !== '');
                // إذا كان هناك مسار، فأول جزء هو اسم المستودع
                if (parts.length > 0) {
                    const repo = parts[0];
                    return { owner, repo, basePath: parts.slice(1).join('/') || '' };
                } else {
                    // صفحات المستخدم (user page) ليس لها مستودع فرعي، قد يكون repo = owner.github.io
                    // لكننا نتعامل معها كمستودع يسمى owner.github.io
                    return { owner, repo: `${owner}.github.io`, basePath: '' };
                }
            }
            // بيئة محلية أو غير مدعومة
            return null;
        }

        const repoInfo = detectRepo();
        if (!repoInfo) {
            showError('لم يتم اكتشاف مستودع GitHub Pages. تأكد من تشغيل الصفحة عبر <username>.github.io/<repo>.');
            return;
        }

        const { owner, repo, basePath } = repoInfo;
        let branch = 'main'; // سنحاول اكتشاف الفرع الافتراضي لاحقاً
        let currentPath = basePath || ''; // مسار نسبي من الجذر (قد يكون فارغاً أو مجلد)

        // استخراج رمز وصول من الرابط (اختياري)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token') || '';

        function getHeaders() {
            const headers = { 'Accept': 'application/vnd.github.v3+json' };
            if (token) headers['Authorization'] = `token ${token}`;
            return headers;
        }

        // اكتشاف الفرع الافتراضي
        async function fetchDefaultBranch() {
            try {
                const url = `https://api.github.com/repos/${owner}/${repo}`;
                const res = await fetch(url, { headers: getHeaders() });
                if (res.ok) {
                    const data = await res.json();
                    branch = data.default_branch || 'main';
                }
            } catch (e) { /* استمر باستخدام main */ }
        }

        // جلب محتويات مسار
        async function fetchContents(path) {
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
            const res = await fetch(url, { headers: getHeaders() });
            if (!res.ok) {
                if (res.status === 403) throw new Error('تم تجاوز حد الطلبات. أضف ?token=TOKEN للرابط أو انتظر.');
                if (res.status === 404) throw new Error('المسار غير موجود');
                throw new Error(`خطأ ${res.status}`);
            }
            return res.json();
        }

        async function loadDirectory(path) {
            fileListDiv.innerHTML = '<div class="loading-text">⏳ جاري التحميل...</div>';
            previewHeader.textContent = '📄 اختر ملفًا لعرضه';
            previewContent.innerHTML = '';
            try {
                const data = await fetchContents(path);
                if (!Array.isArray(data)) throw new Error('المسار ليس مجلداً');
                renderDirectory(data, path);
                currentPath = path;
                updateBreadcrumb(path);
            } catch (err) {
                fileListDiv.innerHTML = `<div class="error-text">❌ ${err.message}</div>`;
            }
        }

        function renderDirectory(items, parentPath) {
            if (items.length === 0) {
                fileListDiv.innerHTML = '<div class="loading-text">📭 المجلد فارغ</div>';
                return;
            }

            const folders = items.filter(i => i.type === 'dir').sort((a,b) => a.name.localeCompare(b.name));
            const files = items.filter(i => i.type === 'file').sort((a,b) => a.name.localeCompare(b.name));
            const sorted = [...folders, ...files];

            let html = '';
            if (parentPath !== '') {
                const parent = parentPath.substring(0, parentPath.lastIndexOf('/')) || '';
                html += `<div class="item folder" data-path="${parent}" data-type="dir">
                    <span class="icon">📁</span><span class="name">.. (المجلد الأعلى)</span>
                </div>`;
            }

            sorted.forEach(item => {
                const icon = item.type === 'dir' ? '📁' : getFileIcon(item.name);
                html += `<div class="item ${item.type === 'dir' ? 'folder' : ''}" 
                              data-path="${item.path}" data-type="${item.type}">
                    <span class="icon">${icon}</span>
                    <span class="name" title="${item.name}">${item.name}</span>
                </div>`;
            });

            fileListDiv.innerHTML = html;

            fileListDiv.querySelectorAll('.item').forEach(el => {
                el.addEventListener('click', async () => {
                    const p = el.dataset.path;
                    if (el.dataset.type === 'dir') await loadDirectory(p);
                    else await previewFile(p);
                });
            });

            if (items.length === 1000) {
                fileListDiv.innerHTML += '<div class="loading-text">⚠️ قد يوجد المزيد من العناصر (الحد الأقصى 1000).</div>';
            }
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                html: '🌐', htm: '🌐', css: '🎨', js: '📜', ts: '📘',
                json: '📋', md: '📝', txt: '📄', pdf: '📕',
                png: '🖼️', jpg: '🖼️', jpeg: '🖼️', gif: '🖼️', svg: '🖼️', webp: '🖼️',
                mp4: '🎬', mp3: '🎵', wav: '🎵', zip: '📦', rar: '📦'
            };
            return icons[ext] || '📄';
        }

        async function previewFile(filePath) {
            previewHeader.textContent = `📄 ${filePath}`;
            previewContent.innerHTML = '<div class="loading-text">⏳ تحميل المحتوى...</div>';
            try {
                const fileData = await fetchContents(filePath);
                const ext = filePath.split('.').pop().toLowerCase();
                const isHtml = ext === 'html' || ext === 'htm';
                const isImage = ['png','jpg','jpeg','gif','svg','webp','ico'].includes(ext);
                const isText = ['txt','md','csv','json','xml','css','js','ts','py','java','c','cpp','rb','go','rs','sh','yml','yaml','toml','ini'].includes(ext);

                if (isHtml) {
                    const htmlContent = decodeBase64(fileData.content);
                    const blob = new Blob([htmlContent], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    previewContent.innerHTML = `<iframe sandbox="allow-scripts allow-same-origin" src="${url}"></iframe>`;
                } else if (isImage) {
                    const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${filePath}`;
                    previewContent.innerHTML = `<img src="${rawUrl}" alt="${filePath}">`;
                } else if (isText || fileData.size < 100000) {
                    const text = decodeBase64(fileData.content);
                    previewContent.innerHTML = `<pre>${escapeHtml(text)}</pre>`;
                } else {
                    previewContent.innerHTML = `<div class="loading-text">⚠️ لا يمكن معاينة هذا الملف. <br>
                    <a href="https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${filePath}" target="_blank">فتح في تبويب جديد</a></div>`;
                }
            } catch (err) {
                previewContent.innerHTML = `<div class="error-text">❌ ${err.message}</div>`;
            }
        }

        function decodeBase64(str) {
            const binary = atob(str.replace(/\s/g, ''));
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateBreadcrumb(path) {
            if (!path) {
                breadcrumbDiv.innerHTML = '<span data-path="">🏠 الجذر</span>';
            } else {
                const parts = path.split('/');
                let cumulative = '';
                let html = '<span data-path="">🏠 الجذر</span> / ';
                parts.forEach((part, i) => {
                    cumulative += (i === 0 ? '' : '/') + part;
                    html += `<span data-path="${cumulative}">${part}</span> / `;
                });
                breadcrumbDiv.innerHTML = html;
            }
            breadcrumbDiv.querySelectorAll('span').forEach(span => {
                span.addEventListener('click', (e) => {
                    loadDirectory(e.target.dataset.path);
                });
            });
        }

        function showError(message) {
            appDiv.style.display = 'none';
            errorDiv.style.display = 'flex';
            errorMsg.textContent = message;
        }

        // البدء
        (async function init() {
            await fetchDefaultBranch();
            // إظهار التطبيق
            appDiv.style.display = 'flex';
            loadDirectory(currentPath);
        })().catch(err => showError(err.message));
    })();
</script>
</body>
</html>
