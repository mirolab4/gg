<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📁 مستعرض الملفات</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --primary-light: #818cf8;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #3b82f6;
    --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --card-bg: rgba(255, 255, 255, 0.97);
    --card-border: rgba(255, 255, 255, 0.3);
    --text-primary: #1f2937;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
    --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.15);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
    --card-bg: rgba(30, 30, 40, 0.97);
    --card-border: rgba(255, 255, 255, 0.1);
    --text-primary: #f9fafb;
    --text-secondary: #d1d5db;
    --text-muted: #9ca3af;
    --bg-gradient: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg-gradient);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
}

.bg-animation {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
}

.shape {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    animation: float 20s infinite ease-in-out;
}

.shape-1 { width: 400px; height: 400px; background: #6366f1; top: -100px; right: -100px; }
.shape-2 { width: 500px; height: 500px; background: #ec4899; bottom: -150px; left: -150px; animation-delay: 5s; }
.shape-3 { width: 350px; height: 350px; background: #10b981; top: 50%; left: 50%; animation-delay: 10s; }

@keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(50px, -50px) scale(1.1); }
    66% { transform: translate(-50px, 50px) scale(0.9); }
}

.theme-toggle {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(10px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    color: var(--text-primary);
    transition: var(--transition);
    z-index: 100;
    box-shadow: var(--shadow-md);
}

.theme-toggle:hover { transform: rotate(180deg) scale(1.1); }

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
}

.header {
    text-align: center;
    padding: 30px 20px;
    color: white;
    animation: fadeInDown 0.8s ease;
}

.logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 10px;
}

.logo i { font-size: 2.5rem; }

.logo h1 {
    font-size: 2rem;
    font-weight: 900;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

.subtitle { font-size: 1rem; opacity: 0.9; }

/* ==================== بطاقة التشخيص ==================== */
.debug-card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: var(--radius-md);
    padding: 15px 20px;
    margin: 15px auto;
    max-width: 700px;
    color: white;
    font-size: 0.9rem;
    text-align: right;
}

.debug-card h4 {
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1rem;
}

.debug-item {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    flex-wrap: wrap;
    gap: 5px;
}

.debug-item:last-child { border-bottom: none; }

.debug-label { opacity: 0.8; }

.debug-value {
    font-family: 'JetBrains Mono', monospace;
    background: rgba(0, 0, 0, 0.2);
    padding: 2px 8px;
    border-radius: 4px;
    direction: ltr;
    font-size: 0.85rem;
}

.status-ok { color: #10b981; }
.status-error { color: #ef4444; }
.status-warn { color: #f59e0b; }

.repo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border-radius: 50px;
    margin-top: 15px;
    font-size: 0.9rem;
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.repo-badge a {
    color: white;
    text-decoration: none;
    font-weight: 600;
}

.main-card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    border-radius: var(--radius-lg);
    padding: 25px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--card-border);
    animation: fadeInUp 0.8s ease;
    margin-top: 20px;
}

.toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.breadcrumbs {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-wrap: wrap;
    flex: 1;
}

.breadcrumb-item {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    text-decoration: none;
    transition: var(--transition);
    font-size: 0.9rem;
    cursor: pointer;
    background: transparent;
    border: none;
    font-family: inherit;
}

.breadcrumb-item:hover {
    background: rgba(99, 102, 241, 0.1);
    color: var(--primary);
}

.breadcrumb-item.active {
    background: var(--primary);
    color: white;
    font-weight: 600;
}

.breadcrumb-separator { color: var(--text-muted); }

.tools { display: flex; align-items: center; gap: 10px; }

.search-box { position: relative; }

.search-box i {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
}

.search-box input {
    padding: 8px 35px 8px 12px;
    border: 2px solid var(--card-border);
    border-radius: var(--radius-md);
    font-family: inherit;
    background: rgba(255, 255, 255, 0.5);
    color: var(--text-primary);
    width: 200px;
    transition: var(--transition);
}

[data-theme="dark"] .search-box input { background: rgba(0, 0, 0, 0.3); }

.search-box input:focus {
    outline: none;
    border-color: var(--primary);
    width: 250px;
}

.view-toggle {
    display: flex;
    background: rgba(0, 0, 0, 0.05);
    border-radius: var(--radius-sm);
    padding: 3px;
}

[data-theme="dark"] .view-toggle { background: rgba(255, 255, 255, 0.05); }

.view-btn {
    padding: 6px 10px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 6px;
    transition: var(--transition);
}

.view-btn.active { background: var(--primary); color: white; }

.btn-icon {
    width: 38px;
    height: 38px;
    padding: 0;
    background: rgba(0, 0, 0, 0.05);
    color: var(--text-primary);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
}

[data-theme="dark"] .btn-icon { background: rgba(255, 255, 255, 0.05); }

.btn-icon:hover { background: var(--primary); color: white; }

.path-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 15px;
    background: rgba(99, 102, 241, 0.05);
    border-radius: var(--radius-md);
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
}

.path-stats {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-secondary);
    font-size: 0.9rem;
}

.separator { color: var(--text-muted); }

.path-actions { display: flex; gap: 8px; }

.btn-sm {
    padding: 6px 12px;
    font-size: 0.85rem;
    background: rgba(0, 0, 0, 0.05);
    color: var(--text-primary);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: var(--transition);
}

[data-theme="dark"] .btn-sm { background: rgba(255, 255, 255, 0.05); }

.btn-sm:hover { background: var(--primary); color: white; }

.files-container { min-height: 300px; }

.files-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.files-list.grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
}

.file-item {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px 15px;
    background: rgba(255, 255, 255, 0.5);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: var(--transition);
}

[data-theme="dark"] .file-item { background: rgba(0, 0, 0, 0.2); }

.file-item:hover {
    border-color: var(--primary);
    transform: translateX(-4px);
    box-shadow: var(--shadow-md);
}

.files-list.grid-view .file-item {
    flex-direction: column;
    text-align: center;
    padding: 20px 10px;
    gap: 10px;
}

.file-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
}

.files-list.grid-view .file-icon {
    width: 55px;
    height: 55px;
    font-size: 1.6rem;
}

.file-icon.folder { background: rgba(251, 191, 36, 0.15); color: #f59e0b; }
.file-icon.file { background: rgba(99, 102, 241, 0.15); color: var(--primary); }
.file-icon.image { background: rgba(236, 72, 153, 0.15); color: #ec4899; }
.file-icon.code { background: rgba(16, 185, 129, 0.15); color: #10b981; }
.file-icon.markdown { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
.file-icon.html { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
.file-icon.archive { background: rgba(139, 92, 246, 0.15); color: #8b5cf6; }

.file-info { flex: 1; min-width: 0; }

.file-name {
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.file-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.file-actions {
    display: flex;
    gap: 5px;
    opacity: 0;
    transition: var(--transition);
}

.file-item:hover .file-actions { opacity: 1; }
.files-list.grid-view .file-actions { opacity: 1; }

.file-action-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 6px;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
}

.file-action-btn:hover { background: var(--primary); color: white; }

.loading {
    text-align: center;
    padding: 60px 20px;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 4px solid var(--card-border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.empty-state, .error-state, .info-state {
    text-align: center;
    padding: 60px 20px;
}

.empty-state { color: var(--text-muted); }
.error-state { color: var(--danger); }
.info-state { color: var(--info); }

.empty-state i, .error-state i, .info-state i {
    font-size: 4rem;
    margin-bottom: 20px;
    opacity: 0.3;
}

.error-state i { opacity: 0.5; }

.empty-state h3, .error-state h3, .info-state h3 {
    margin-bottom: 10px;
}

.error-state h3 { color: var(--danger); }
.info-state h3 { color: var(--info); }

.help-box {
    background: rgba(59, 130, 246, 0.1);
    border: 1px solid rgba(59, 130, 246, 0.3);
    border-radius: var(--radius-md);
    padding: 20px;
    margin: 20px auto;
    max-width: 600px;
    text-align: right;
    color: var(--text-primary);
}

.help-box h4 {
    margin-bottom: 10px;
    color: var(--info);
    display: flex;
    align-items: center;
    gap: 8px;
}

.help-box ol {
    padding-right: 20px;
    line-height: 2;
}

.help-box code {
    background: rgba(0, 0, 0, 0.05);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9em;
    direction: ltr;
    display: inline-block;
}

[data-theme="dark"] .help-box code { background: rgba(255, 255, 255, 0.1); }

.file-preview {
    position: fixed;
    inset: 0;
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    z-index: 1000;
    display: none;
    flex-direction: column;
    animation: slideIn 0.3s ease;
}

.file-preview.active { display: flex; }

@keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: rgba(99, 102, 241, 0.05);
    border-bottom: 1px solid var(--card-border);
    flex-wrap: wrap;
    gap: 15px;
}

.preview-title {
    display: flex;
    align-items: center;
    gap: 15px;
    min-width: 0;
    flex: 1;
}

.preview-title i { font-size: 1.8rem; color: var(--primary); }

.preview-title-info { min-width: 0; }

.preview-title h3 {
    color: var(--text-primary);
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.preview-title p { font-size: 0.85rem; color: var(--text-muted); }

.preview-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.preview-mode-toggle {
    display: flex;
    background: rgba(0, 0, 0, 0.05);
    border-radius: var(--radius-sm);
    padding: 3px;
    margin-right: 10px;
}

[data-theme="dark"] .preview-mode-toggle { background: rgba(255, 255, 255, 0.05); }

.mode-btn {
    padding: 6px 12px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 6px;
    transition: var(--transition);
    font-family: inherit;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 5px;
}

.mode-btn.active { background: var(--primary); color: white; }

.preview-content {
    flex: 1;
    overflow: auto;
    padding: 25px;
}

.preview-content pre {
    background: #282c34;
    padding: 20px;
    border-radius: var(--radius-md);
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    line-height: 1.6;
}

.preview-content code { font-family: 'JetBrains Mono', monospace; }

.preview-content img {
    max-width: 100%;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-md);
    display: block;
    margin: 0 auto;
}

.preview-content .markdown-body {
    max-width: 900px;
    margin: 0 auto;
    padding: 30px;
    background: var(--card-bg);
    border-radius: var(--radius-md);
    border: 1px solid var(--card-border);
}

.preview-content .markdown-body h1,
.preview-content .markdown-body h2,
.preview-content .markdown-body h3 {
    margin-top: 24px;
    margin-bottom: 16px;
    color: var(--text-primary);
}

.preview-content .markdown-body p { margin-bottom: 16px; line-height: 1.7; }

.preview-content .markdown-body code {
    background: rgba(99, 102, 241, 0.1);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
}

.preview-content .markdown-body pre code {
    background: transparent;
    padding: 0;
}

.preview-content iframe {
    width: 100%;
    height: calc(100vh - 130px);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-md);
    background: white;
}

.toast-container {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 2000;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.toast {
    padding: 15px 20px;
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-lg);
    border-right: 4px solid var(--primary);
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 280px;
    animation: slideInLeft 0.3s ease;
}

.toast.success { border-right-color: var(--success); }
.toast.error { border-right-color: var(--danger); }
.toast.warning { border-right-color: var(--warning); }
.toast.info { border-right-color: var(--info); }

.toast i { font-size: 1.3rem; }
.toast.success i { color: var(--success); }
.toast.error i { color: var(--danger); }
.toast.warning i { color: var(--warning); }
.toast.info i { color: var(--info); }

@keyframes slideInLeft {
    from { transform: translateX(-100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
    .container { padding: 10px; }
    .main-card { padding: 15px; }
    .logo h1 { font-size: 1.5rem; }
    .logo i { font-size: 2rem; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .tools { flex-wrap: wrap; justify-content: center; }
    .search-box input { width: 100%; }
    .search-box input:focus { width: 100%; }
    .file-actions { opacity: 1; }
    .preview-header { padding: 12px 15px; }
    .preview-content { padding: 15px; }
    .preview-title h3 { font-size: 1rem; }
    .theme-toggle { top: 10px; left: 10px; width: 40px; height: 40px; }
    .debug-card { font-size: 0.8rem; }
}

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }
</style>
</head>
<body>

<div class="bg-animation">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
</div>

<button class="theme-toggle" id="themeToggle" title="تبديل الثيم">
    <i class="fas fa-moon"></i>
</button>

<div class="container">
    <header class="header">
        <div class="logo">
            <i class="fab fa-github"></i>
            <h1>مستعرض الملفات</h1>
        </div>
        <p class="subtitle">استعراض ملفات المستودع الحالي</p>
        
        <!-- بطاقة التشخيص -->
        <div class="debug-card" id="debugCard">
            <h4><i class="fas fa-stethoscope"></i> معلومات التشخيص</h4>
            <div class="debug-item">
                <span class="debug-label">الرابط الحالي:</span>
                <span class="debug-value" id="debugUrl">-</span>
            </div>
            <div class="debug-item">
                <span class="debug-label">اسم المستخدم:</span>
                <span class="debug-value" id="debugOwner">-</span>
            </div>
            <div class="debug-item">
                <span class="debug-label">اسم المستودع:</span>
                <span class="debug-value" id="debugRepo">-</span>
            </div>
            <div class="debug-item">
                <span class="debug-label">الفرع:</span>
                <span class="debug-value" id="debugBranch">-</span>
            </div>
            <div class="debug-item">
                <span class="debug-label">حالة API:</span>
                <span class="debug-value" id="debugApiStatus">جاري الفحص...</span>
            </div>
        </div>

        <div class="repo-badge" id="repoBadge" style="display: none;">

<div class="toast-container" id="toastContainer"></div>

<script>
// ==================== الإعدادات ====================
const CONFIG = {
    API_BASE: 'https://api.github.com',
    RAW_BASE: 'https://raw.githubusercontent.com',
    GITHUB_BASE: 'https://github.com'
};

// ==================== الحالة ====================
const state = {
    owner: '',
    repo: '',
    branch: 'main',
    currentPath: '',
    files: [],
    viewMode: 'list',
    currentFile: null,
    currentContent: null,
    htmlBlobUrl: null,
    htmlContent: null,
    currentTextContent: null
};

// ==================== أيقونات الملفات ====================
const FILE_ICONS = {
    folder: { icon: 'fa-folder', class: 'folder' },
    html: { icon: 'fa-file-code', class: 'html' },
    css: { icon: 'fa-file-code', class: 'code' },
    js: { icon: 'fa-js', class: 'code' },
    json: { icon: 'fa-file-code', class: 'code' },
    py: { icon: 'fa-python', class: 'code' },
    md: { icon: 'fa-file-alt', class: 'markdown' },
    image: { icon: 'fa-file-image', class: 'image' },
    archive: { icon: 'fa-file-archive', class: 'archive' },
    file: { icon: 'fa-file', class: 'file' }
};

const IMAGE_EXTS = ['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp', 'bmp', 'ico'];
const CODE_EXTS = ['js', 'ts', 'py', 'java', 'cpp', 'c', 'h', 'cs', 'go', 'rs', 'rb', 'php', 'swift', 'kt', 'css', 'scss', 'less'];
const TEXT_EXTS = ['txt', 'log', 'env', 'gitignore', 'dockerignore', 'editorconfig'];
const ARCHIVE_EXTS = ['zip', 'rar', '7z', 'tar', 'gz'];

// ==================== التهيئة ====================
document.addEventListener('DOMContentLoaded', async () => {
    console.log('🚀 بدء تشغيل مستعرض الملفات');
    initTheme();
    setupEventListeners();
    await detectRepository();
});

// ==================== كشف المستودع ====================
async function detectRepository() {
    const hostname = window.location.hostname;
    const pathname = window.location.pathname;
    const fullUrl = window.location.href;
    
    console.log('📍 URL الحالي:', fullUrl);
    console.log('🌐 Hostname:', hostname);
    console.log('📂 Pathname:', pathname);
    
    // تحديث معلومات التشخيص
    document.getElementById('debugUrl').textContent = fullUrl;
    
    // حالة 1: GitHub Pages - username.github.io/repo-name/
    if (hostname.endsWith('.github.io')) {
        const username = hostname.replace('.github.io', '');
        const pathParts = pathname.split('/').filter(Boolean);
        
        state.owner = username;
        
        if (pathParts.length > 0) {
            state.repo = pathParts[0];
        } else {
            // المستخدم على username.github.io فقط
            state.repo = username + '.github.io';
        }
        
        console.log('✅ GitHub Pages detected:', state.owner + '/' + state.repo);
        
    } else if (hostname === 'localhost' || hostname === '127.0.0.1') {
        // حالة 2: بيئة محلية - لا يمكن العمل بدون إعدادات
        showError(
            'بيئة محلية',
            'أنت تعمل على localhost. هذا التطبيق يحتاج إلى GitHub Pages ليعمل تلقائياً.',
            [
                'ارفع الملفات إلى مستودع على GitHub',
                'فعّل GitHub Pages من Settings → Pages',
                'افتح الرابط: <code>https://username.github.io/repo-name/</code>'
            ]
        );
        
        document.getElementById('debugOwner').textContent = 'localhost (غير مدعوم)';
        document.getElementById('debugRepo').textContent = '-';
        document.getElementById('debugApiStatus').innerHTML = '<span class="status-error">❌ غير مدعوم</span>';
        return;
        
    } else {
        // حالة 3: نطاق مخصص أو بيئة أخرى
        showError(
            'نطاق غير مدعوم',
            `النطاق الحالي (${hostname}) لا يدعم الكشف التلقائي.`,
            [
                'استخدم GitHub Pages: <code>username.github.io/repo-name</code>',
                'أو أضف إعدادات يدوية في الكود'
            ]
        );
        
        document.getElementById('debugOwner').textContent = hostname;
        document.getElementById('debugRepo').textContent = 'غير معروف';
        document.getElementById('debugApiStatus').innerHTML = '<span class="status-error">❌ غير مدعوم</span>';
        return;
    }
    
    // تحديث واجهة التشخيص
    document.getElementById('debugOwner').textContent = state.owner;
    document.getElementById('debugRepo').textContent = state.repo;
    
    // تحديث رابط المستودع
    const repoBadge = document.getElementById('repoBadge');
    const repoLink = document.getElementById('repoLink');
    repoLink.textContent = `${state.owner} / ${state.repo}`;
    repoLink.href = `${CONFIG.GITHUB_BASE}/${state.owner}/${state.repo}`;
    repoBadge.style.display = 'inline-flex';
    
    // محاولة تحميل المستودع
    await tryLoadRepository();
}

// ==================== محاولة التحميل مع fallback ====================
async function tryLoadRepository() {
    updateApiStatus('جاري الفحص...', 'warn');
    
    // 1. محاولة الحصول على معلومات المستودع
    try {
        const repoInfo = await fetchRepoInfo();
        state.branch = repoInfo.default_branch || 'main';
        console.log('✅ المستودع موجود، الفرع:', state.branch);
        updateApiStatus('✅ متصل', 'ok');
        
        // تحميل الفروع والمحتوى
        await loadDirectory('');
        
    } catch (error) {
        console.error('❌ خطأ:', error);
        
        if (error.message.includes('404')) {
            // 2. المستودع غير موجود - ربما الاسم خاطئ
            showError(
                'المستودع غير موجود',
                `لم يتم العثور على المستودع: <code>${state.owner}/${state.repo}</code>`,
                [
                    'تأكد من اسم المستودع صحيح',
                    'تأكد أن المستودع <strong>Public</strong> (عام)',
                    'تأكد أنك رفعت ملفات إلى المستودع',
                    'الرابط الصحيح: <code>https://' + state.owner + '.github.io/' + state.repo + '/</code>'
                ]
            );
            updateApiStatus('❌ 404 - غير موجود', 'error');
            
        } else if (error.message.includes('403') || error.message.includes('rate limit')) {
            // 3. تجاوز حد API
            showError(
                'تم تجاوز حد GitHub API',
                'لقد تجاوزت الحد المسموح (60 طلب/ساعة). انتظر ساعة أو استخدم Token.',
                [
                    'انتظر 60 دقيقة وحاول مرة أخرى',
                    'أو أضف GitHub Token في الكود لزيادة الحد إلى 5000 طلب/ساعة',
                    'افتح Console (F12) لمزيد من التفاصيل'
                ]
            );
            updateApiStatus('⚠️ Rate Limit', 'warn');
            
        } else if (error.message.includes('401')) {
            showError(
                'المستودع خاص',
                'هذا المستودع خاص (Private). التطبيق يعمل فقط مع المستودعات العامة.',
                [
                    'اجعل المستودع Public من Settings',
                    'أو أضف GitHub Token مع صلاحيات repo'
                ]
            );
            updateApiStatus('❌ 401 - خاص', 'error');
            
        } else {
            showError(
                'خطأ في الاتصال',
                error.message,
                [
                    'تحقق من اتصالك بالإنترنت',
                    'افتح Console (F12) لمزيد من التفاصيل',
                    'حاول مرة أخرى بعد قليل'
                ]
            );
            updateApiStatus('❌ خطأ', 'error');
        }
    }
}

function updateApiStatus(text, type) {
    const el = document.getElementById('debugApiStatus');
    const classMap = { ok: 'status-ok', error: 'status-error', warn: 'status-warn' };
    el.innerHTML = `<span class="${classMap[type]}">${text}</span>`;
    document.getElementById('debugBranch').textContent = state.branch || '-';
}

// ==================== GitHub API ====================
async function fetchRepoInfo() {
    const url = `${CONFIG.API_BASE}/repos/${state.owner}/${state.repo}`;
    console.log('🔍 فحص المستودع:', url);
    
    const response = await fetch(url);
    
    if (!response.ok) {
        const status = response.status;
        if (status === 404) throw new Error('404 - المستودع غير موجود');
        if (status === 403) {
            const data = await response.json().catch(() => ({}));
            if (data.message && data.message.includes('rate limit')) {
                throw new Error('rate limit - تم تجاوز حد API');
            }
            throw new Error('403 - ممنوع');
        }
        if (status === 401) throw new Error('401 - غير مصرح');
        throw new Error(`HTTP ${status}`);
    }
    
    return response.json();
}

async function loadDirectory(path = '') {
    state.currentPath = path;
    showLoading(true);
    hideError();
    
    try {
        // إصلاح: إزالة الـ trailing slash
        const cleanPath = path.replace(/\/$/, '');
        const url = `${CONFIG.API_BASE}/repos/${state.owner}/${state.repo}/contents/${cleanPath}?ref=${state.branch}`;
        console.log('📂 تحميل المجلد:', url);
        
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const files = await response.json();
        
        if (!Array.isArray(files)) {
            throw new Error('استجابة غير متوقعة من API');
        }
        
        // ترتيب: المجلدات أولاً
        state.files = files.sort((a, b) => {
            if (a.type === b.type) return a.name.localeCompare(b.name);
            return a.type === 'dir' ? -1 : 1;
        });
        
        console.log(`✅ تم تحميل ${files.length} عنصر`);
        
        renderFiles('');
        updateBreadcrumbs();
        updatePathInfo();
        
    } catch (error) {
        console.error('❌ خطأ في التحميل:', error);
        showError(
            'فشل تحميل المجلد',
            error.message,
            [
                'تحقق من اتصالك بالإنترنت',
                'ربما تم تجاوز حد API - انتظر دقيقة',
                'افتح Console (F12) للتفاصيل'
            ]
        );
    } finally {
        showLoading(false);
    }
}

async function fetchFileContent(path) {
    const url = `${CONFIG.API_BASE}/repos/${state.owner}/${state.repo}/contents/${path}?ref=${state.branch}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error('فشل تحميل الملف');
    return response.json();
}

// ==================== العرض ====================
function renderFiles(query = '') {
    const container = document.getElementById('filesList');
    const emptyState = document.getElementById('emptyState');
    
    let files = state.files;
    if (query) {
        files = files.filter(f => f.name.toLowerCase().includes(query.toLowerCase()));
    }
    
    if (files.length === 0) {
        container.innerHTML = '';
        if (query) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-search"></i>
                    <h3>لا توجد نتائج</h3>
                    <p>جرب كلمة بحث مختلفة</p>
                </div>
            `;
            emptyState.style.display = 'none';
        } else {
            emptyState.style.display = 'block';
        }
        return;
    }
    
    emptyState.style.display = 'none';
    container.className = `files-list ${state.viewMode === 'grid' ? 'grid-view' : ''}`;
    
    container.innerHTML = files.map(file => createFileItem(file)).join('');
    
    container.querySelectorAll('.file-item').forEach((item, idx) => {
        const file = files[idx];
        item.addEventListener('click', (e) => {
            if (e.target.closest('.file-action-btn')) return;
            handleFileClick(file);
        });
    });
    
    container.querySelectorAll('.file-download-btn').forEach((btn, idx) => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            downloadSpecificFile(files[idx]);
        });
    });
    
    container.querySelectorAll('.file-copy-btn').forEach((btn, idx) => {
        btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const file = files[idx];
            if (file.type === 'file') {
                const url = `${CONFIG.RAW_BASE}/${state.owner}/${state.repo}/${state.branch}/${file.path}`;
                try {
                    await navigator.clipboard.writeText(url);
                    showToast('success', 'تم نسخ الرابط');
                } catch (err) {
                    showToast('error', 'فشل النسخ');
                }
            }
        });
    });
}

function createFileItem(file) {
    const icon = getFileIcon(file);
    const size = file.size ? formatSize(file.size) : '-';
    const isDir = file.type === 'dir';
    
    return `
        <div class="file-item" data-type="${file.type}" data-name="${file.name}">
            <div class="file-icon ${icon.class}">
                <i class="fas ${icon.icon}"></i>
            </div>
            <div class="file-info">
                <div class="file-name" title="${file.name}">${file.name}</div>
                <div class="file-meta">
                    ${isDir ? '<span><i class="fas fa-folder"></i> مجلد</span>' : `<span><i class="fas fa-weight-hanging"></i> ${size}</span>`}
                </div>
            </div>
            ${!isDir ? `
                <div class="file-actions">
                    <button class="file-action-btn file-copy-btn" title="نسخ الرابط">
                        <i class="fas fa-link"></i>
                    </button>
                    <button class="file-action-btn file-download-btn" title="تحميل">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            ` : ''}
        </div>
    `;
}

function getFileIcon(file) {
    if (file.type === 'dir') return FILE_ICONS.folder;
    const ext = file.name.split('.').pop().toLowerCase();
    if (IMAGE_EXTS.includes(ext)) return FILE_ICONS.image;
    if (ext === 'html' || ext === 'htm') return FILE_ICONS.html;
    if (ext === 'md') return FILE_ICONS.markdown;
    if (CODE_EXTS.includes(ext)) return FILE_ICONS.code;
    if (TEXT_EXTS.includes(ext)) return FILE_ICONS.file;
    if (ARCHIVE_EXTS.includes(ext)) return FILE_ICONS.archive;
    if (['json', 'xml', 'yaml', 'yml', 'toml'].includes(ext)) return FILE_ICONS.code;
    return FILE_ICONS.file;
}

function handleFileClick(file) {
    if (file.type === 'dir') {
        loadDirectory(file.path);
    } else {
        openFilePreview(file);
    }
}

// ==================== معاينة الملف ====================
async function openFilePreview(file) {
    showLoading(true);
    
    try {
        const content = await fetchFileContent(file.path);
        const ext = file.name.split('.').pop().toLowerCase();
        
        document.getElementById('previewFileName').textContent = file.name;
        document.getElementById('previewFileInfo').textContent = 
            `${formatSize(file.size)} • ${getFileType(ext)}`;
        document.getElementById('previewIcon').className = 
            `fas ${getFileIcon(file).icon}`;
        
        const previewContent = document.getElementById('previewContent');
        const modeToggle = document.getElementById('previewModeToggle');
        
        state.currentFile = file;
        state.currentContent = content;
        
        if (IMAGE_EXTS.includes(ext)) {
            modeToggle.style.display = 'none';
            previewContent.innerHTML = `<img src="${content.download_url}" alt="${file.name}">`;
        } else if (ext === 'md') {
            modeToggle.style.display = 'none';
            const html = marked.parse(atob(content.content));
            previewContent.innerHTML = `<div class="markdown-body">${html}</div>`;
        } else if (ext === 'html' || ext === 'htm') {
            modeToggle.style.display = 'flex';
            const decoded = atob(content.content);
            const blob = new Blob([decoded], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            
            previewContent.innerHTML = `
                <div id="previewRendered">
                    <iframe src="${url}" sandbox="allow-scripts"></iframe>
                </div>
                <div id="previewCode" style="display: none;">
                    <pre><code class="language-html">${escapeHtml(decoded)}</code></pre>
                </div>
            `;
            hljs.highlightAll();
            state.htmlBlobUrl = url;
            state.htmlContent = decoded;
        } else if (CODE_EXTS.includes(ext) || TEXT_EXTS.includes(ext) || 
                   ['json', 'xml', 'yaml', 'yml', 'toml'].includes(ext)) {
            modeToggle.style.display = 'none';
            const decoded = atob(content.content);
            previewContent.innerHTML = `
                <pre><code class="language-${ext}">${escapeHtml(decoded)}</code></pre>
            `;
            hljs.highlightAll();
            state.currentTextContent = decoded;
        } else {
            modeToggle.style.display = 'none';
            previewContent.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-file"></i>
                    <h3>لا يمكن معاينة هذا الملف</h3>
                    <p>نوع الملف: ${ext.toUpperCase()}</p>
                    <a href="${content.download_url}" target="_blank" class="btn-sm" style="margin-top: 20px; display: inline-flex;">
                        <i class="fas fa-download"></i>
                        تحميل الملف
                    </a>
                </div>
            `;
        }
        
        document.getElementById('filePreview').classList.add('active');
        
    } catch (error) {
        showToast('error', error.message);
    } finally {
        showLoading(false);
    }
}

function togglePreviewMode(mode) {
    const rendered = document.getElementById('previewRendered');
    const code = document.getElementById('previewCode');
    if (!rendered || !code) return;
    
    if (mode === 'rendered') {
        rendered.style.display = 'block';
        code.style.display = 'none';
    } else {
        rendered.style.display = 'none';
        code.style.display = 'block';
    }
}

function closePreview() {
    document.getElementById('filePreview').classList.remove('active');
    if (state.htmlBlobUrl) {
        URL.revokeObjectURL(state.htmlBlobUrl);
        state.htmlBlobUrl = null;
    }
}

// ==================== الأحداث ====================
function setupEventListeners() {
    document.getElementById('themeToggle').addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const newTheme = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
    });
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        renderFiles(e.target.value);
    });
    
    document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.viewMode = btn.dataset.view;
            renderFiles(document.getElementById('searchInput').value);
        });
    });
    
    document.getElementById('refreshBtn').addEventListener('click', () => {
        loadDirectory(state.currentPath);
    });
    
    document.getElementById('closePreviewBtn').addEventListener('click', closePreview);
    document.getElementById('copyContentBtn').addEventListener('click', copyContent);
    document.getElementById('downloadFileBtn').addEventListener('click', downloadFile);
    document.getElementById('openRawBtn').addEventListener('click', openRaw);
    document.getElementById('copyPathBtn').addEventListener('click', copyPath);
    document.getElementById('openGithubBtn').addEventListener('click', openInGithub);
    
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            togglePreviewMode(btn.dataset.mode);
        });
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closePreview();
        if (e.ctrlKey && e.key === 'f') {
            e.preventDefault();
            document.getElementById('searchInput').focus();
        }
    });
}

function initTheme() {
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    updateThemeIcon(saved);
}

function updateThemeIcon(theme) {
    const icon = document.querySelector('#themeToggle i');
    icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
}

// ==================== أزرار المعاينة ====================
async function copyContent() {
    if (!state.currentContent) return;
    try {
        const content = atob(state.currentContent.content);
        await navigator.clipboard.writeText(content);
        showToast('success', 'تم نسخ المحتوى');
    } catch (e) {
        showToast('error', 'فشل النسخ');
    }
}

function downloadFile() {
    if (!state.currentContent) return;
    window.open(state.currentContent.download_url, '_blank');
}

function openRaw() {
    if (!state.currentContent) return;
    window.open(state.currentContent.download_url, '_blank');
}

function copyPath() {
    const path = `${CONFIG.GITHUB_BASE}/${state.owner}/${state.repo}/tree/${state.branch}/${state.currentPath}`;
    navigator.clipboard.writeText(path);
    showToast('success', 'تم نسخ المسار');
}

function openInGithub() {
    const path = `${CONFIG.GITHUB_BASE}/${state.owner}/${state.repo}/tree/${state.branch}/${state.currentPath}`;
    window.open(path, '_blank');
}

async function downloadSpecificFile(file) {
    try {
        const url = `${CONFIG.RAW_BASE}/${state.owner}/${state.repo}/${state.branch}/${file.path}`;
        const response = await fetch(url);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = file.name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
        showToast('success', `تم تحميل ${file.name}`);
    } catch (e) {
        showToast('error', 'فشل التحميل');
    }
}

// ==================== Breadcrumbs ====================
function updateBreadcrumbs() {
    const container = document.getElementById('breadcrumbs');
    const parts = state.currentPath ? state.currentPath.split('/') : [];
    
    let html = `
        <button class="breadcrumb-item ${parts.length === 0 ? 'active' : ''}" data-path="">
            <i class="fas fa-home"></i>
            <span>${state.repo}</span>
        </button>
    `;
    
    let currentPath = '';
    parts.forEach((part, idx) => {
        currentPath += (currentPath ? '/' : '') + part;
        const isLast = idx === parts.length - 1;
        html += `
            <span class="breadcrumb-separator">/</span>
            <button class="breadcrumb-item ${isLast ? 'active' : ''}" data-path="${currentPath}">
                <span>${part}</span>
            </button>
        `;
    });
    
    container.innerHTML = html;
    
    container.querySelectorAll('.breadcrumb-item').forEach(item => {
        item.addEventListener('click', () => {
            loadDirectory(item.dataset.path);
        });
    });
}

function updatePathInfo() {
    const folders = state.files.filter(f => f.type === 'dir').length;
    const files = state.files.filter(f => f.type === 'file').length;
    document.getElementById('itemsCount').textContent = `${folders} مجلد، ${files} ملف`;
    const path = state.currentPath ? '/' + state.currentPath : '/';
    document.getElementById('currentPath').textContent = path;
}

// ==================== أدوات مساعدة ====================
function formatSize(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function getFileType(ext) {
    const types = {
        html: 'HTML', htm: 'HTML', css: 'CSS', js: 'JavaScript', ts: 'TypeScript',
        py: 'Python', json: 'JSON', md: 'Markdown', txt: 'Text',
        png: 'PNG Image', jpg: 'JPEG Image', jpeg: 'JPEG Image',
        gif: 'GIF Image', svg: 'SVG Image', webp: 'WebP Image',
        zip: 'ZIP Archive', pdf: 'PDF Document'
    };
    return types[ext] || ext.toUpperCase();
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'block' : 'none';
    document.getElementById('filesList').style.display = show ? 'none' : '';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('errorState').style.display = 'none';
}

function showError(title, message, steps = []) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('filesList').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    
    const errorState = document.getElementById('errorState');
    document.getElementById('errorTitle').textContent = title;
    document.getElementById('errorMessage').innerHTML = message;
    
    const helpBox = document.getElementById('helpBox');
    const helpSteps = document.getElementById('helpSteps');
    
    if (steps.length > 0) {
        helpSteps.innerHTML = steps.map(s => `<li>${s}</li>`).join('');
        helpBox.style.display = 'block';
    } else {
        helpBox.style.display = 'none';
    }
    
    errorState.style.display = 'block';
}

function hideError() {
    document.getElementById('errorState').style.display = 'none';
}

function showToast(type, message) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = {
        success: 'fa-check-circle',
        error: 'fa-times-circle',
        warning: 'fa-exclamation-triangle',
        info: 'fa-info-circle'
    };
    toast.innerHTML = `<i class="fas ${icons[type]}"></i><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'slideInLeft 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}
</script>
