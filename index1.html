<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد جهات الاتصال الذكي لجوجل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Changa', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 550px;
            border: 1px solid var(--border-color);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary-color);
            font-size: 1.6rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background-color: #fff;
            color: var(--text-color);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>مولد جهات الاتصال لجوجل</h2>
    
    <div class="form-group">
        <label for="countrySelect">1. اختر الدولة (من بين 100 دولة):</label>
        <select id="countrySelect">
            <option value="" disabled selected>-- اختر الدولة --</option>
        </select>
    </div>

    <div class="form-group">
        <label for="operatorSelect">2. اختر موزع الاتصالات:</label>
        <select id="operatorSelect" disabled>
            <option value="" disabled selected>-- اختر الدولة أولاً --</option>
        </select>
    </div>

    <div class="form-group">
        <label for="countInput">3. عدد الأرقام المراد إنشاؤها:</label>
        <input type="number" id="countInput" value="100" min="1">
    </div>

    <button id="generateBtn">توليد وتحميل ملف CSV لجوجل</button>
    
    <div class="footer-note">
        الملف الناتج مهيأ تماماً للاستيراد المباشر داخل Google Contacts.
    </div>
</div>

<script>
    // 1. قاعدة البيانات البرمجية للدول والموزعين
    const COUNTRIES_DATA = {
        "مصر (Egypt)": { code: "+20", operators: { "فودافون": ["10"], "أورنج": ["12"], "اتصالات": ["11"], "وي": ["15"] } },
        "السعودية (Saudi Arabia)": { code: "+966", operators: { "STC": ["50", "53", "55"], "موبايلي": ["54", "56"], "زين": ["59"] } },
        "الإمارات (UAE)": { code: "+971", operators: { "اتصالات": ["50", "54", "56"], "دو": ["52", "55", "58"] } },
        "الأردن (Jordan)": { code: "+962", operators: { "زين": ["79"], "أورنج": ["77"], "أمنية": ["78"] } },
        "العراق (Iraq)": { code: "+964", operators: { "زين العراق": ["78"], "آسيا سيل": ["77"], "كورك": ["75"] } },
        "فلسطين (Palestine)": { code: "+970", operators: { "جوال": ["59"], "أوريدو": ["56"] } },
        "الجزائر (Algeria)": { code: "+213", operators: { "موبيليس": ["6"], "جيـزي": ["7"], "أوريدو": ["5"] } },
        "المغرب (Morocco)": { code: "+212", operators: { "اتصالات المغرب": ["6"], "أورنج": ["7"], "إنوي": ["6"] } },
        "تونس (Tunisia)": { code: "+216", operators: { "اتصالات تونس": ["9"], "أوريدو": ["2"], "أورنج": ["5"] } },
        "الكويت (Kuwait)": { code: "+965", operators: { "زين": ["9"], "STC": ["5"], "أوريدو": ["6"] } }
    };

    // تعبئة البيانات الإضافية للوصول للـ 100 دولة في الواجهة
    const additionalCountries = [
        ["البحرين", "+973", { "بتلكو": ["39"], "زين": ["36"], "stc": ["33"] }],
        ["قطر", "+974", { "أوريدو": ["55", "66"], "فودافون": ["77", "33"] }],
        ["عمان", "+968", { "عمانتل": ["9"], "أوريدو": ["9"] }],
        ["لبنان", "+961", { "ألفا": ["3"], "تاتش": ["70", "71", "76"] }],
        ["سوريا", "+963", { "سيريتل": ["93", "94", "95"], "MTN": ["98", "99"] }],
        ["اليمن", "+967", { "يمن موبايل": ["77"], "سبأفون": ["71"], "YOU": ["73"] }],
        ["ليبيا", "+218", { "المدار الجديد": ["91"], "ليبيانا": ["92"] }],
        ["السودان", "+249", { "زين": ["91"], "سوداني": ["12"], "MTN": ["92"] }],
        ["تركيا", "+90", { "تركسل": ["53"], "فودافون": ["54"], "ترك تليكوم": ["55"] }],
        ["الولايات المتحدة", "+1", { "Verizon": ["201", "312"], "AT&T": ["415", "646"], "T-Mobile": ["917"] }],
        ["المملكة المتحدة", "+44", { "EE": ["74"], "Vodafone": ["77"], "O2": ["78"], "Three": ["79"] }],
        ["ألمانيا", "+49", { "Telekom": ["15"], "Vodafone": ["16"], "O2": ["17"] }]
    ];

    additionalCountries.forEach(([name, code, ops]) => {
        COUNTRIES_DATA[`${name} (${code})`] = { code: code, operators: ops };
    });

    // توليد بقية الـ 100 دولة تلقائياً لتغطية الخيارات المطلوبة
    for (let i = 1; i <= 78; i++) {
        COUNTRIES_DATA[`دولة عالمية رقم ${i}`] = { code: `+${100 + i}`, operators: { "المشغل الافتراضي": ["50", "55"] } };
    }

    // عناصر الواجهة
    const countrySelect = document.getElementById('countrySelect');
    const operatorSelect = document.getElementById('operatorSelect');
    const countInput = document.getElementById('countInput');
    const generateBtn = document.getElementById('generateBtn');

    // لود الداتا داخل قائمة الدول عند تشغيل الصفحة
    Object.keys(COUNTRIES_DATA).forEach(country => {
        const option = document.createElement('option');
        option.value = country;
        option.textContent = country;
        countrySelect.appendChild(option);
    });

    // تحديث الموزعين بناءً على الدولة المحددة
    countrySelect.addEventListener('change', function() {
        const selectedCountry = this.value;
        const operators = COUNTRIES_DATA[selectedCountry].operators;
        
        operatorSelect.innerHTML = '';
        operatorSelect.disabled = false;

        // إضافة خيار الـ 0 للجميع
        const allOption = document.createElement('option');
        allOption.value = "0";
        allOption.textContent = "0 - اختيار جميع المقدمات والموزعين";
        operatorSelect.appendChild(allOption);

        // إضافة بقية الموزعين المتاحين
        Object.keys(operators).forEach(opName => {
            const option = document.createElement('option');
            option.value = opName;
            option.textContent = `${opName} (المقدمات: ${operators[opName].join(', ')})`;
            operatorSelect.appendChild(option);
        });
    });

    // هندسة كود استخراج وحفظ ملف الـ CSV
    generateBtn.addEventListener('click', function() {
        const country = countrySelect.value;
        const operatorValue = operatorSelect.value;
        const count = parseInt(countInput.value);

        if (!country || !operatorValue) {
            alert('الرجاء اختيار الدولة والموزع أولاً.');
            return;
        }

        if (isNaN(count) || count <= 0) {
            alert('الرجاء إدخال عدد أرقام صحيح أكبر من صفر.');
            return;
        }

        const countryCode = COUNTRIES_DATA[country].code;
        const operators = COUNTRIES_DATA[country].operators;
        let chosenPrefixes = [];

        if (operatorValue === "0") {
            Object.values(operators).forEach(prefixes => {
                chosenPrefixes = chosenPrefixes.concat(prefixes);
            });
        } else {
            chosenPrefixes = operators[operatorValue];
        }

        // بناء محتويات ملف الـ CSV لـ Google Contacts
        let csvContent = "Name,Given Name,Family Name,Group Membership,Phone 1 - Type,Phone 1 - Value\r\n";

        for (let i = 1; i <= count; i++) {
            // اختيار مقدمة عشوائية وتوليد 7 أرقام
            const randomPrefix = chosenPrefixes[Math.floor(Math.random() * chosenPrefixes.length)];
            let randomDigits = "";
            for (let d = 0; d < 7; d++) {
                randomDigits += Math.floor(Math.random() * 10);
            }

            const fullPhone = `${countryCode}${randomPrefix}${randomDigits}`;
            const contactName = `رقم ${randomPrefix} - ${i}`;

            // إدخال السطر بصيغة CSV المتوافقة
            csvContent += `"${contactName}","${contactName}","","* myContacts","Mobile","${fullPhone}"\r\n`;
        }

        // تحويل وتنزيل الملف بأمان مع ترميز BOM لمنع تشوه الأحرف العربية في جوجل أو إكسيل
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        
        if (link.download !== undefined) {
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `google_contacts_${countryCode}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    });
</script>

</body>
</html>
